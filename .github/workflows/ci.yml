name: CI Pipeline

on:
  push:
    branches: [main, '0**']
  pull_request:
    branches: [main]

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install -r production/requirements.txt
      - name: Run tests
        run: |
          pytest tests/ production/tests/ -v --tb=short --ignore=production/tests/test_e2e.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  build-nextjs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and build
        run: |
          cd src/web-form
          npm ci
          npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
